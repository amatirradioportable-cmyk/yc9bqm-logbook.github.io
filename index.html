<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cek Sertifikat QSO</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 5px;
}

.subtitle {
  margin-bottom: 20px;
  font-size: 14px;
  opacity: 0.8;
}

.container {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 900px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

a.download-btn {
  background: #28a745;
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 13px;
}

a.download-btn:hover {
  background: #218838;
}

.dataTables_filter input {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}
</style>

</head>

<body>

<h1>?? CEK SERTIFIKAT QSO</h1>
<div class="subtitle">Silakan masukkan callsign Anda</div>

<div class="container">
  <table id="tabel" class="display" style="width:100%">
    <thead>
      <tr>
        <th>Callsign</th>
        <th>Download Sertifikat</th>
      </tr>
    </thead>
  </table>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<script>

// ?? ID GOOGLE SHEETS ADMIN
var sheetID = "1SRFhhcyXDiXGziHdfy88r9rOAK481OC53kiz0p0xBr0";

// ?? NAMA SHEET (biasanya Sheet1)
var sheetName = "Sheet1";

// ambil data dari Google Sheets
var url = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

fetch(url)
  .then(res => res.json())
  .then(data => {

    let dataset = [];

    data.forEach(row => {
      dataset.push([
        row.CALLSIGN,
        `<a class="download-btn" href="${row.LINK}" target="_blank">Download</a>`
      ]);
    });

    $('#tabel').DataTable({
      data: dataset,
      pageLength: 10,
      language: {
        search: "?? Cari Callsign:",
        lengthMenu: "Tampilkan _MENU_ data",
        info: "Menampilkan _START_ - _END_ dari _TOTAL_ data",
        paginate: {
          previous: "Prev",
          next: "Next"
        }
      }
    });

  });

</script>

</body>
</html>
